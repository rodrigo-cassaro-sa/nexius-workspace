# apache-app.conf
# Servidor web do Workspace S&A.
# Regra de seguranca: somente public/ e /api ficam acessiveis pela web.
# includes/ (config e segredos), sql/, cron/ e logs/ estao fora do DocumentRoot.

<VirtualHost *:80>
    # Frontend (HTML/CSS/JS) servido a partir de public/.
    DocumentRoot /var/www/html/public

    # Cabecalhos de seguranca (defesa em profundidade). O app so usa recursos proprios
    # (sem CDN, sem script inline), por isso o CSP pode ser restritivo. Inline style e
    # permitido porque ha atributos style="" nas paginas.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; form-action 'self'"

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Endpoints JSON: /api/... -> /var/www/html/api/...
    Alias /api /var/www/html/api
    <Directory /var/www/html/api>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Bloqueio extra (defesa em profundidade) caso alguem aponte para estas pastas.
    <Directory /var/www/html/includes>
        Require all denied
    </Directory>
    <Directory /var/www/html/sql>
        Require all denied
    </Directory>
    <Directory /var/www/html/cron>
        Require all denied
    </Directory>
    <Directory /var/www/html/logs>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
