<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Perfil do usuario. Inclui dados basicos e preferencia de tema. -->
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-marca"><img class="marca-img-sidebar" src="assets/img/logo_escuro.png" alt="Grupo Nexius"></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Dashboard</span></a>
        <a href="demandas.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg><span>Demandas</span></a>
        <a href="acoes.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg><span>Ações</span></a>
        <a href="notificacoes.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Notificações</span></a>
        <a href="chat.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span>Mensagens</span><span class="badge badge-erro chat-contador" hidden></span></a>
        <a href="progresso.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="6"></circle><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path></svg><span>Progresso</span></a>
        <a href="admin-usuarios.html" id="nav-usuarios" hidden><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Usuários</span></a>
      </nav>
    </aside>

    <div class="app-conteudo">
      <header class="app-topbar">
        <form class="topbar-busca" id="form-busca-topo" role="search">
          <svg class="busca-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input class="busca-input" id="busca-topo" type="search" placeholder="Buscar demandas..." autocomplete="off" aria-label="Buscar demandas">
        </form>
        <div class="topbar-usuario">
          <div id="sino-notificacoes" class="sino">
            <button id="sino-botao" class="sino-botao" type="button" aria-label="Notificações">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
              <span class="badge badge-erro notif-contador" hidden></span>
            </button>
            <div id="sino-painel" class="sino-painel" hidden>
              <div class="sino-cabecalho"><strong>Notificações</strong><a href="notificacoes.html">Ver todas</a></div>
              <div id="sino-lista"></div>
            </div>
          </div>
          <a href="perfil.html" class="usuario-chip">
            <span class="avatar" id="usuario-avatar" aria-hidden="true"></span>
            <span class="usuario-textos">
              <span class="usuario-nome" id="usuario-nome"></span>
              <span class="usuario-cargo" id="usuario-perfil"></span>
            </span>
          </a>
          <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <section class="card">
          <h1>Meu perfil</h1>

          <div id="mensagem-perfil" class="alerta" role="alert" aria-live="polite" hidden></div>

          <form id="form-perfil" novalidate>
            <div class="campo">
              <label class="campo-label" for="nome">Nome</label>
              <input class="campo-input" id="nome" name="nome" type="text" maxlength="100" required>
            </div>

            <div class="campo">
              <label class="campo-label" for="email">E-mail</label>
              <input class="campo-input" id="email" type="email" disabled>
              <p class="texto-secundario">O e-mail não pode ser alterado.</p>
            </div>

            <div class="campo">
              <span class="campo-label">Perfil</span>
              <p><span class="badge" id="p-perfil">—</span></p>
            </div>

            <button id="botao-salvar" class="botao botao-primario" type="submit">Salvar</button>
          </form>
        </section>

        <section class="card">
          <h2>Trocar senha</h2>

          <div id="mensagem-senha" class="alerta" role="alert" aria-live="polite" hidden></div>

          <form id="form-senha" novalidate>
            <div class="campo">
              <label class="campo-label" for="senha-atual">Senha atual</label>
              <input class="campo-input" id="senha-atual" type="password" autocomplete="current-password" required>
            </div>
            <div class="campo">
              <label class="campo-label" for="senha-nova">Nova senha</label>
              <input class="campo-input" id="senha-nova" type="password" autocomplete="new-password" minlength="8" required>
            </div>
            <div class="campo">
              <label class="campo-label" for="senha-confirmar">Confirmar nova senha</label>
              <input class="campo-input" id="senha-confirmar" type="password" autocomplete="new-password" minlength="8" required>
            </div>
            <button id="botao-senha" class="botao botao-primario" type="submit">Alterar senha</button>
          </form>
        </section>

        <section class="card">
          <h2>Preferências</h2>
          <p class="texto-secundario">Tema da interface (claro ou escuro).</p>
          <button id="botao-tema" class="botao botao-secundario" type="button">Alternar tema</button>

          <div class="pref-digest">
            <label class="toggle">
              <input type="checkbox" id="pref-digest">
              <span class="toggle-trilho"></span>
              <span class="pref-digest-texto">Receber resumo semanal por e-mail</span>
            </label>
            <p class="texto-secundario">Um resumo das suas pendências e ações atrasadas. Você pode desligar quando quiser.</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
