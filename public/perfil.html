<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Perfil do usuario. Inclui dados basicos e preferencia de tema. -->
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-marca">Workspace S&amp;A</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="demandas.html">Demandas</a>
        <a href="admin-usuarios.html" id="nav-usuarios" hidden>Usuários</a>
      </nav>
    </aside>

    <div class="app-conteudo">
      <header class="app-topbar">
        <strong>Perfil</strong>
        <div class="topbar-usuario">
          <span id="usuario-nome"></span>
          <span class="badge-perfil" id="usuario-perfil"></span>
          <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <section class="card">
          <h1>Meu perfil</h1>
          <p class="texto-secundario">Nome</p>
          <p id="p-nome">—</p>
          <p class="texto-secundario">E-mail</p>
          <p id="p-email">—</p>
          <p class="texto-secundario">Perfil</p>
          <p><span class="badge" id="p-perfil">—</span></p>
        </section>

        <section class="card">
          <h2>Preferências</h2>
          <p class="texto-secundario">Tema da interface (claro ou escuro).</p>
          <button id="botao-tema" class="botao botao-secundario" type="button">Alternar tema</button>
        </section>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
