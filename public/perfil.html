  <!-- Tela: Perfil do usuario. Inclui dados basicos, alterar senha e preferencia de tema. -->

    <section class="card">
      <h1>Perfil</h1>
      <!-- TODO (fase de usuarios): nome, e-mail, perfil (leitura), alterar senha -->

    // Liga o botao de tema ao helper de app.js (interacao simples, sem regra de negocio).
    document.getElementById("botao-tema").addEventListener("click", alternarTema);
