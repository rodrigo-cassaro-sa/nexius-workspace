<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuracao inicial - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Setup do primeiro administrador (so funciona enquanto nao houver usuarios). -->
  <main class="pagina-login">
    <section class="card card-login">
      <header class="login-marca">
        <p class="marca-logo">GRUPO NEXIUS</p>
        <h1 class="login-titulo">Configuracao inicial</h1>
        <p class="login-subtitulo">Crie o primeiro administrador</p>
      </header>

      <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-setup" novalidate>
        <div class="campo">
          <label class="campo-label" for="nome">Nome</label>
          <input class="campo-input" id="nome" name="nome" type="text" autocomplete="name" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="email">E-mail</label>
          <input class="campo-input" id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="senha">Senha (mínimo 8 caracteres)</label>
          <input class="campo-input" id="senha" name="senha" type="password" autocomplete="new-password" required>
        </div>

        <button id="botao-criar" class="botao botao-primario botao-bloco" type="submit">Criar administrador</button>
      </form>

      <footer class="login-rodape">
        <a href="index.html">Ir para o login</a>
      </footer>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/setup.js"></script>
</body>
</html>
