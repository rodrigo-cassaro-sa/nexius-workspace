<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Login -->
  <div class="auth-layout">
    <div class="auth-principal">
      <aside class="auth-marca">
        <div class="auth-marca-logo">
          <img class="marca-img" src="assets/img/logo_escuro.png" alt="Grupo Nexius">
        </div>
      </aside>

      <main class="auth-conteudo">
        <section class="auth-card">
          <h1 class="auth-titulo">Workspace S&amp;A</h1>
          <p class="auth-subtitulo">Acesse sua conta</p>

          <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

          <form id="form-login" novalidate>
            <div class="campo">
              <label class="campo-label" for="email">E-mail</label>
              <input class="campo-input" id="email" name="email" type="email" placeholder="seu.email@empresa.com" autocomplete="email" required>
            </div>

            <div class="campo">
              <label class="campo-label" for="senha">Senha</label>
              <div class="campo-senha">
                <input class="campo-input" id="senha" name="senha" type="password" placeholder="Sua senha" autocomplete="current-password" required>
                <button type="button" class="botao-olho" data-alvo="senha" aria-label="Mostrar senha">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <button id="botao-entrar" class="botao botao-primario botao-bloco" type="submit">Entrar</button>
          </form>

          <footer class="login-rodape">
            <a href="recuperar-senha.html">Esqueci minha senha</a>
          </footer>
        </section>
      </main>
    </div>

    <footer class="auth-rodape">© Grupo Nexius. Todos os direitos reservados.</footer>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
