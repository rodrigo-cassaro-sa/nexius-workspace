<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - Workspace S&amp;A</title>

  <!-- Ordem dos CSS: reset -> tokens -> componentes -> paginas -> responsivo -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Login -->
  <main class="pagina-login">
    <section class="card card-login">
      <header class="login-marca">
        <p class="marca-logo">GRUPO NEXIUS</p>
        <h1 class="login-titulo">Entrar</h1>
        <p class="login-subtitulo">Workspace S&amp;A</p>
      </header>

      <!-- Mensagem de erro/sucesso (preenchida pelo JS) -->
      <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-login" novalidate>
        <div class="campo">
          <label class="campo-label" for="email">E-mail</label>
          <input class="campo-input" id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="senha">Senha</label>
          <input class="campo-input" id="senha" name="senha" type="password" autocomplete="current-password" required>
        </div>

        <button id="botao-entrar" class="botao botao-primario botao-bloco" type="submit">Entrar</button>
      </form>

      <footer class="login-rodape">
        <a href="recuperar-senha.html">Esqueci minha senha</a>
      </footer>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
