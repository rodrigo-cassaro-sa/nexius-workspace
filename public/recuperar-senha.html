<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar senha - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Recuperacao de senha (solicitar link). -->
  <div class="auth-layout">
    <div class="auth-principal">
      <aside class="auth-marca">
        <div class="auth-marca-logo">
          <img class="marca-img" src="assets/img/logo_escuro.png" alt="Grupo Nexius">
        </div>
      </aside>

      <main class="auth-conteudo">
        <section class="auth-card">
          <h1 class="auth-titulo">Recuperar senha</h1>
          <p class="auth-subtitulo">Informe seu e-mail para receber as instruções</p>

          <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

          <form id="form-recuperar" novalidate>
            <div class="campo">
              <label class="campo-label" for="email">E-mail</label>
              <input class="campo-input" id="email" name="email" type="email" placeholder="seu.email@empresa.com" autocomplete="email" required>
            </div>

            <button id="botao-enviar" class="botao botao-primario botao-bloco" type="submit">Enviar instruções</button>
          </form>

          <footer class="login-rodape">
            <a href="index.html">Voltar para o login</a>
          </footer>
        </section>
      </main>
    </div>

    <footer class="auth-rodape">© Grupo Nexius. Todos os direitos reservados.</footer>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/recuperar-senha.js"></script>
</body>
</html>
