<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demandas - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Lista de demandas. -->
  <header class="topbar">
    <strong class="topbar-marca">Workspace S&amp;A</strong>
    <div class="topbar-usuario">
      <a href="dashboard.html">Painel</a>
      <span id="usuario-nome"></span>
      <span class="badge-perfil" id="usuario-perfil"></span>
      <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
    </div>
  </header>

  <main class="pagina-dashboard">
    <section class="card">
      <div class="linha-titulo">
        <h1>Demandas</h1>
        <button id="botao-nova" class="botao botao-primario" type="button" hidden>Nova demanda</button>
      </div>

      <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <div class="filtros">
        <input class="campo-input" id="filtro-busca" type="text" placeholder="Buscar por título...">
        <select class="campo-input" id="filtro-status">
          <option value="">Ativas</option>
          <option value="aberta">Aberta</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluida">Concluída</option>
          <option value="arquivada">Arquivada</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>

      <div id="lista-demandas">
        <p class="texto-secundario">Carregando...</p>
      </div>
    </section>
  </main>

  <!-- Modal: Nova demanda -->
  <div id="modal-nova" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-nova-titulo">
    <div class="modal-conteudo">
      <h2 class="modal-titulo" id="modal-nova-titulo">Nova demanda</h2>

      <div id="modal-mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-nova" novalidate>
        <div class="campo">
          <label class="campo-label" for="titulo">Título</label>
          <input class="campo-input" id="titulo" name="titulo" type="text" maxlength="160" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="descricao">Descrição</label>
          <textarea class="campo-input" id="descricao" name="descricao" rows="3"></textarea>
        </div>

        <div class="campo">
          <label class="campo-label" for="responsavel">Responsável</label>
          <select class="campo-input" id="responsavel" name="responsavel">
            <option value="">Sem responsável</option>
          </select>
        </div>

        <div class="modal-acoes">
          <button type="button" class="botao botao-secundario" id="botao-cancelar">Cancelar</button>
          <button type="submit" class="botao botao-primario" id="botao-salvar">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/demandas.js"></script>
</body>
</html>
