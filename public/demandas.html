<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demandas - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Lista de demandas. -->
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-marca">Workspace S&amp;A</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Dashboard</span></a>
        <a href="demandas.html" class="ativo"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg><span>Demandas</span></a>
        <a href="notificacoes.html"><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Notificações</span></a>
        <a href="admin-usuarios.html" id="nav-usuarios" hidden><svg class="nav-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Usuários</span></a>
      </nav>
    </aside>

    <div class="app-conteudo">
      <header class="app-topbar">
        <strong>Demandas</strong>
        <div class="topbar-usuario">
          <div id="sino-notificacoes" class="sino">
            <button id="sino-botao" class="sino-botao" type="button" aria-label="Notificações">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
              <span class="badge badge-erro notif-contador" hidden></span>
            </button>
            <div id="sino-painel" class="sino-painel" hidden>
              <div class="sino-cabecalho"><strong>Notificações</strong><a href="notificacoes.html">Ver todas</a></div>
              <div id="sino-lista"></div>
            </div>
          </div>
          <a href="perfil.html" class="clicavel" id="usuario-nome"></a>
          <span class="badge-perfil" id="usuario-perfil"></span>
          <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

        <section class="card">
          <div class="barra-ferramentas">
            <input class="campo-input campo-busca" id="filtro-busca" type="text" placeholder="Buscar demandas...">
            <select class="campo-input" id="filtro-status" aria-label="Status">
              <option value="">Status: todos</option>
              <option value="aberta">Aberta</option>
              <option value="em_andamento">Em andamento</option>
              <option value="concluida">Concluída</option>
              <option value="arquivada">Arquivada</option>
              <option value="cancelada">Cancelada</option>
            </select>
            <select class="campo-input" id="filtro-responsavel" aria-label="Responsável">
              <option value="">Responsável: todos</option>
            </select>
            <button id="botao-nova" class="botao botao-primario acao-direita" type="button" hidden>+ Criar demanda</button>
          </div>

          <div id="lista-demandas">
            <p class="texto-secundario">Carregando...</p>
          </div>

          <div class="paginacao" id="paginacao" hidden>
            <span class="info" id="paginacao-info"></span>
            <div class="controles">
              <button class="botao botao-secundario" id="pag-anterior" type="button">Anterior</button>
              <button class="botao botao-secundario" id="pag-proxima" type="button">Próxima</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Modal: Nova demanda -->
  <div id="modal-nova" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-nova-titulo">
    <div class="modal-conteudo">
      <h2 class="modal-titulo" id="modal-nova-titulo">Nova demanda</h2>

      <div id="modal-mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-nova" novalidate>
        <div class="campo">
          <label class="campo-label" for="titulo">Nome da nova demanda</label>
          <input class="campo-input" id="titulo" name="titulo" type="text" maxlength="160" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="descricao">Descrição</label>
          <textarea class="campo-input" id="descricao" name="descricao" rows="3"></textarea>
        </div>

        <div class="campo">
          <label class="campo-label" for="responsavel">Responsável</label>
          <select class="campo-input" id="responsavel" name="responsavel">
            <option value="">Sem responsável</option>
          </select>
        </div>

        <div class="modal-acoes">
          <button type="button" class="botao botao-secundario" id="botao-cancelar">Cancelar</button>
          <button type="submit" class="botao botao-primario" id="botao-salvar">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/demandas.js"></script>
</body>
</html>
