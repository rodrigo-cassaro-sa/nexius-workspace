<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notificações - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Notificações internas do usuario. -->
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-marca">Workspace S&amp;A</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="demandas.html">Demandas</a>
        <a href="notificacoes.html" class="ativo">Notificações <span id="notif-contador" class="badge badge-erro" hidden></span></a>
        <a href="admin-usuarios.html" id="nav-usuarios" hidden>Usuários</a>
      </nav>
    </aside>

    <div class="app-conteudo">
      <header class="app-topbar">
        <strong>Notificações</strong>
        <div class="topbar-usuario">
          <a href="perfil.html" class="clicavel" id="usuario-nome"></a>
          <span class="badge-perfil" id="usuario-perfil"></span>
          <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <section class="card">
          <div class="linha-titulo">
            <h1>Notificações</h1>
            <button id="botao-marcar-todas" class="botao botao-secundario" type="button">Marcar todas como lidas</button>
          </div>

          <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

          <div id="lista-notificacoes">
            <p class="texto-secundario">Carregando...</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/notificacoes.js"></script>
</body>
</html>
