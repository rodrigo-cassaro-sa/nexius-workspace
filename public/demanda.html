<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demanda - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Detalhe da demanda (plano de acao e comentarios entram nas proximas fases). -->
  <header class="topbar">
    <strong class="topbar-marca">Workspace S&amp;A</strong>
    <div class="topbar-usuario">
      <a href="demandas.html">Demandas</a>
      <span id="usuario-nome"></span>
      <span class="badge-perfil" id="usuario-perfil"></span>
      <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
    </div>
  </header>

  <main class="pagina-dashboard">
    <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

    <div id="carregando" class="card">
      <p class="texto-secundario">Carregando...</p>
    </div>

    <!-- Detalhe (somente leitura) -->
    <section class="card" id="bloco-detalhe" hidden>
      <div class="linha-titulo">
        <h1 id="d-titulo"></h1>
        <span class="badge" id="d-status"></span>
      </div>
      <p id="d-descricao"></p>
      <p class="texto-secundario">Responsável: <span id="d-responsavel"></span></p>
      <p class="texto-secundario">Criada por <span id="d-criador"></span> em <span id="d-data"></span></p>

      <div class="acoes-demanda" id="acoes-gestor" hidden>
        <button class="botao botao-secundario" id="botao-editar" type="button">Editar</button>
        <button class="botao botao-secundario" id="botao-arquivar" type="button">Arquivar</button>
      </div>
    </section>

    <!-- Edicao (Gestor/Admin) -->
    <section class="card" id="bloco-edicao" hidden>
      <h2>Editar demanda</h2>
      <div id="edicao-mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-editar" novalidate>
        <div class="campo">
          <label class="campo-label" for="e-titulo">Título</label>
          <input class="campo-input" id="e-titulo" type="text" maxlength="160" required>
        </div>
        <div class="campo">
          <label class="campo-label" for="e-descricao">Descrição</label>
          <textarea class="campo-input" id="e-descricao" rows="3"></textarea>
        </div>
        <div class="campo">
          <label class="campo-label" for="e-responsavel">Responsável</label>
          <select class="campo-input" id="e-responsavel">
            <option value="">Sem responsável</option>
          </select>
        </div>
        <div class="campo">
          <label class="campo-label" for="e-status">Status</label>
          <select class="campo-input" id="e-status">
            <option value="aberta">Aberta</option>
            <option value="em_andamento">Em andamento</option>
          </select>
        </div>
        <div class="modal-acoes">
          <button type="button" class="botao botao-secundario" id="botao-cancelar-edicao">Cancelar</button>
          <button type="submit" class="botao botao-primario" id="botao-salvar-edicao">Salvar</button>
        </div>
      </form>
    </section>

    <section class="card" id="bloco-plano" hidden>
      <h2>Plano de ação</h2>
      <p class="texto-secundario">As ações desta demanda entram na próxima etapa.</p>
    </section>
  </main>

  <!-- Modal: confirmar arquivar -->
  <div id="modal-arquivar" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-arquivar-titulo">
    <div class="modal-conteudo">
      <h2 class="modal-titulo" id="modal-arquivar-titulo">Arquivar demanda</h2>
      <p>Tem certeza que deseja arquivar esta demanda? Ela sai da lista de ativas.</p>
      <div class="modal-acoes">
        <button type="button" class="botao botao-secundario" id="botao-arquivar-cancelar">Cancelar</button>
        <button type="button" class="botao botao-primario" id="botao-arquivar-confirmar">Arquivar</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/demanda.js"></script>
</body>
</html>
