<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Administracao de usuarios (apenas Admin; o backend valida o acesso real). -->
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-marca">Workspace S&amp;A</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="demandas.html">Demandas</a>
        <a href="notificacoes.html">Notificações</a>
        <a href="admin-usuarios.html" id="nav-usuarios" class="ativo">Usuários</a>
      </nav>
    </aside>

    <div class="app-conteudo">
      <header class="app-topbar">
        <strong>Usuários</strong>
        <div class="topbar-usuario">
          <div id="sino-notificacoes" class="sino">
            <button id="sino-botao" class="sino-botao" type="button" aria-label="Notificações">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
              <span class="badge badge-erro notif-contador" hidden></span>
            </button>
            <div id="sino-painel" class="sino-painel" hidden>
              <div class="sino-cabecalho"><strong>Notificações</strong><a href="notificacoes.html">Ver todas</a></div>
              <div id="sino-lista"></div>
            </div>
          </div>
          <a href="perfil.html" class="clicavel" id="usuario-nome"></a>
          <span class="badge-perfil" id="usuario-perfil"></span>
          <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <section class="card">
          <h1>Convidar usuário</h1>

          <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

          <form id="form-convite" novalidate>
            <div class="campo">
              <label class="campo-label" for="email">E-mail</label>
              <input class="campo-input" id="email" name="email" type="email" placeholder="pessoa@empresa.com" autocomplete="off" required>
            </div>

            <div class="campo">
              <label class="campo-label" for="perfil">Perfil</label>
              <select class="campo-input" id="perfil" name="perfil">
                <option value="colaborador">Colaborador</option>
                <option value="gestor">Gestor</option>
                <option value="administrador">Administrador</option>
              </select>
            </div>

            <button id="botao-convidar" class="botao botao-primario" type="submit">Gerar convite</button>
          </form>

          <div id="bloco-link" class="link-convite" hidden>
            <p class="campo-label">Link do convite (envie para a pessoa):</p>
            <input class="campo-input" id="link-convite" type="text" readonly>
          </div>
        </section>

        <section class="card">
          <h2>Convites</h2>
          <div id="lista-convites">
            <p class="texto-secundario">Carregando...</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/admin-usuarios.js"></script>
</body>
</html>
