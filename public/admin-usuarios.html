<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administração de usuários - Workspace S&amp;A</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Tela: Administracao de usuarios (apenas Admin; o backend valida o acesso real). -->
  <header class="topbar">
    <strong class="topbar-marca">Workspace S&amp;A</strong>
    <div class="topbar-usuario">
      <a href="dashboard.html">Painel</a>
      <span id="usuario-nome"></span>
      <span class="badge-perfil" id="usuario-perfil"></span>
      <button id="botao-sair" class="botao botao-secundario" type="button">Sair</button>
    </div>
  </header>

  <main class="pagina-dashboard">
    <section class="card">
      <h1>Convidar usuário</h1>

      <div id="mensagem" class="alerta" role="alert" aria-live="polite" hidden></div>

      <form id="form-convite" novalidate>
        <div class="campo">
          <label class="campo-label" for="email">E-mail</label>
          <input class="campo-input" id="email" name="email" type="email" autocomplete="off" required>
        </div>

        <div class="campo">
          <label class="campo-label" for="perfil">Perfil</label>
          <select class="campo-input" id="perfil" name="perfil">
            <option value="colaborador">Colaborador</option>
            <option value="gestor">Gestor</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>

        <button id="botao-convidar" class="botao botao-primario" type="submit">Gerar convite</button>
      </form>

      <!-- Link gerado para o admin copiar e enviar (envio por e-mail vira na fase de e-mail). -->
      <div id="bloco-link" class="link-convite" hidden>
        <p class="campo-label">Link do convite (envie para a pessoa):</p>
        <input class="campo-input" id="link-convite" type="text" readonly>
      </div>
    </section>

    <section class="card">
      <h2>Convites</h2>
      <div id="lista-convites">
        <p class="texto-secundario">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/admin-usuarios.js"></script>
</body>
</html>
